<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Zhi Lab develops computational genomics, pangenomics, clinical EHR foundation models, and AI-powered imaging genetics methods.">
        <link rel="stylesheet" href="/styles/main.css">
        <title>{% if page.title %}{{ page.title }} | {% endif %}Zhi Lab</title>
    </head>
    <body>
        <header class="site-header">
            <a class="brand" href="/">
                <span class="brand-mark">Z</span>
                <span>
                    <strong>Zhi Lab</strong>
                    <em>Computational Genomics and Biomedical AI</em>
                </span>
            </a>
            <nav class="site-nav" aria-label="Main navigation">
                <a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
                <a href="/research.html" {% if page.url == "/research.html" %}class="active"{% endif %}>Research</a>
                <a href="/people.html" {% if page.url == "/people.html" %}class="active"{% endif %}>People</a>
                <a href="/software.html" {% if page.url == "/software.html" %}class="active"{% endif %}>Software</a>
                <a href="/funding.html" {% if page.url == "/funding.html" %}class="active"{% endif %}>Funding</a>
                <a href="/activity.html" {% if page.url == "/activity.html" %}class="active"{% endif %}>Activity</a>
                <a href="/career.html" {% if page.url == "/career.html" %}class="active"{% endif %}>Career</a>
            </nav>
        </header>

        <main>
            {{ content }}
        </main>

        <footer class="site-footer">
            <div>
                <strong>Zhi Lab</strong>
                <p>Computational genomics, pangenomics, clinical foundation models, and AI-powered imaging genetics.</p>
            </div>
            <div>
                <span>Yale BIDS · New Haven, Connecticut</span>
                <span>GitHub: <a href="https://github.com/ZhiGroup">ZhiGroup</a></span>
            </div>
        </footer>
    </body>
</html>
