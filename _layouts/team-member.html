<article class="person-card">
    <img src="{{ page.picture | default: '/images/uthealthlogo.png' }}" alt="{{ page.name }}" class="person-photo">
    <div class="person-body">
        <h3>{{ page.name }}</h3>
        <p class="person-title">{{ page.job_title }}</p>
        {% if page.email and page.email != "" and page.email != "EMAIL" %}
            <p class="person-email"><a href="mailto:{{ page.email }}">{{ page.email }}</a></p>
        {% endif %}
        <div class="person-details">
            {{ content }}
        </div>
    </div>
</article>
